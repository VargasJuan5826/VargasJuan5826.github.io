            <rect width="136" height="80" rx="18" fill="#0d1a2c" stroke="#274665"/>
            <text class="metric" x="24" y="44">9</text>
            <text class="muted" x="24" y="66">Alerts</text>
        </g>
        <g transform="translate(338 414)">
            <rect width="136" height="80" rx="18" fill="#0d1a2c" stroke="#274665"/>
            <text class="metric" x="24" y="44">62%</text>
