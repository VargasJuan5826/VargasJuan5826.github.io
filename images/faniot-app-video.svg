            <rect x="258" y="18" width="104" height="28" rx="14" fill="#e9ddff"/>
            <text class="small" x="290" y="37" fill="#41267b">Online</text>
            <rect x="376" y="18" width="168" height="28" rx="14" fill="#ffe3ed"/>
            <text class="small" x="402" y="37" fill="#822344">Lamp failure</text>
        </g>

        <g transform="translate(28 224)">
