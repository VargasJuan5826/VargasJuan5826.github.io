<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
    <title id="title">FANIOTAPP smart lighting dashboard preview</title>
    <desc id="desc">A smart city dashboard preview with a lighting map, device table, status cards, and dimmer controls.</desc>
    <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#07111f"/>
            <stop offset="55%" stop-color="#10243b"/>
            <stop offset="100%" stop-color="#05080f"/>
        </linearGradient>
        <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#12c2e9"/>
            <stop offset="55%" stop-color="#6f5cff"/>
            <stop offset="100%" stop-color="#d30971"/>
        </linearGradient>
        <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#132238"/>
            <stop offset="100%" stop-color="#0b1525"/>
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
        </filter>
        <style>
            .title { font: 800 54px "Segoe UI", Arial, sans-serif; fill: #f8fbff; }
            .subtitle { font: 500 22px "Segoe UI", Arial, sans-serif; fill: #a9bbd3; }
            .label { font: 700 18px "Segoe UI", Arial, sans-serif; fill: #dce7f5; }
            .muted { font: 600 15px "Segoe UI", Arial, sans-serif; fill: #7f91ad; }
            .metric { font: 800 34px "Segoe UI", Arial, sans-serif; fill: #ffffff; }
            .small { font: 700 13px "Segoe UI", Arial, sans-serif; fill: #c7d4e8; }
            .table { font: 700 15px "Segoe UI", Arial, sans-serif; fill: #d8e6f7; }
            .chip { font: 800 13px "Segoe UI", Arial, sans-serif; fill: #eaf7ff; }
        </style>
    </defs>
    <rect width="1600" height="900" fill="url(#bg)"/>
    <circle cx="1360" cy="120" r="230" fill="#12c2e920"/>
    <circle cx="160" cy="790" r="260" fill="#d3097118"/>
    <path d="M0 760 C220 690 330 840 520 770 C760 682 920 730 1090 654 C1280 568 1410 602 1600 524 L1600 900 L0 900 Z" fill="#0ea5e914" opacity="0.72"/>

    <g transform="translate(72 64)">
        <text class="title" x="0" y="0" dominant-baseline="hanging">FANIOTAPP</text>
        <text class="subtitle" x="0" y="68">Smart lighting monitoring and city operations</text>
    </g>

    <g transform="translate(72 178)" filter="url(#shadow)">
        <rect width="500" height="566" rx="26" fill="url(#card)" stroke="#294564"/>
        <rect x="28" y="28" width="444" height="310" rx="20" fill="#0d1a2c" stroke="#2b4f71"/>
        <path d="M72 94 C150 64 206 102 274 78 C344 54 384 90 436 62" fill="none" stroke="#334d67" stroke-width="18" stroke-linecap="round"/>
        <path d="M64 218 C150 176 212 220 286 188 C354 160 392 206 444 180" fill="none" stroke="#334d67" stroke-width="18" stroke-linecap="round"/>
        <path d="M116 298 C162 230 250 252 302 206 C354 160 396 132 440 130" fill="none" stroke="#425f79" stroke-width="8" stroke-linecap="round"/>
        <circle cx="144" cy="132" r="13" fill="#22c55e"/>
