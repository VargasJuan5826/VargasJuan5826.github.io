                <text class="table" x="26" y="34" fill="#1f3048">LUM-030</text>
                <text class="table" x="214" y="34" fill="#1f3048">Downtown</text>
                <rect x="384" y="16" width="84" height="24" rx="12" fill="#dcfce7"/>
                <text class="small" x="405" y="33" fill="#166534">Online</text>
                <text class="table" x="550" y="34" fill="#1f3048">142 W</text>
                <rect x="704" y="22" width="104" height="10" rx="5" fill="#d8e6f7"/>
                <rect x="704" y="22" width="74" height="10" rx="5" fill="#12c2e9"/>
            </g>
            <g transform="translate(0 120)">
                <rect width="860" height="54" rx="12" fill="#f7fbff"/>
                <text class="table" x="26" y="34" fill="#1f3048">LUM-041</text>
                <text class="table" x="214" y="34" fill="#1f3048">Costanera</text>
                <rect x="384" y="16" width="84" height="24" rx="12" fill="#dcfce7"/>
                <text class="small" x="405" y="33" fill="#166534">Online</text>
                <text class="table" x="550" y="34" fill="#1f3048">188 W</text>
                <rect x="704" y="22" width="104" height="10" rx="5" fill="#d8e6f7"/>
                <rect x="704" y="22" width="50" height="10" rx="5" fill="#6f5cff"/>
            </g>
            <g transform="translate(0 182)">
                <rect width="860" height="54" rx="12" fill="#ffffff"/>
                <text class="table" x="26" y="34" fill="#1f3048">LUM-077</text>
                <text class="table" x="214" y="34" fill="#1f3048">Avenue 60</text>
