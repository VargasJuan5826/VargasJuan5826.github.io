        <rect x="28" y="28" width="860" height="78" rx="18" fill="#10243b"/>
        <text class="label" x="58" y="76">Urban lighting dashboard</text>
        <rect x="654" y="48" width="92" height="28" rx="14" fill="#1f3a56"/>
        <text class="chip" x="680" y="67">Live</text>
        <rect x="758" y="48" width="104" height="28" rx="14" fill="url(#accent)"/>
