            <rect x="0" y="0" width="860" height="48" rx="16" fill="#edf5fc"/>
            <text class="muted" x="26" y="30" fill="#49627f">Device</text>
            <text class="muted" x="214" y="30" fill="#49627f">Area</text>
            <text class="muted" x="384" y="30" fill="#49627f">Status</text>
            <text class="muted" x="550" y="30" fill="#49627f">Power</text>
            <text class="muted" x="704" y="30" fill="#49627f">Dimmer</text>

