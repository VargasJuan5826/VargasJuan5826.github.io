    <g transform="translate(1138 770)">
        <rect width="390" height="58" rx="29" fill="#ffffff" opacity="0.12"/>
        <circle cx="52" cy="29" r="18" fill="url(#accent)"/>
        <polygon points="47,20 47,38 63,29" fill="#ffffff"/>
        <text class="label" x="88" y="36">Watch product walkthrough</text>
